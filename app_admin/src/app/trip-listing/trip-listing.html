<div class="mb-3">
  <button *ngIf="isLoggedIn()" (click)="addTrip()" class="btn btn-info">Add Trip</button>
  <span class="ms-3 text-muted" *ngIf="message">{{ message }}</span>
</div>

<div class="row">
  <div *ngFor="let trip of trips" class="col-md-4 mb-4">
    <app-trip-card [trip]="trip"></app-trip-card>
  </div>
</div>
